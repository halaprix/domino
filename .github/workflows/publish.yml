name: Publish to npm

on:
  release:
    types: [published]

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      # Verify release tag (GITHUB_REF_NAME) matches package.json version
      # Fail fast if someone creates a tag for the wrong version
      - name: Verify release tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version '$PKG_VERSION' does not match release tag '$TAG_VERSION'"
            echo "Either bump the version in package.json or use the correct tag."
            exit 1
          fi
          echo "Version verified: $PKG_VERSION == $TAG_VERSION"

      - name: Build
        run: npm run build

      - name: Dry-run publish
        run: npm publish --provenance --access public --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
